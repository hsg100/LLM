services:
  db:
    image: pgvector/pgvector:pg16
    environment:
      POSTGRES_USER: fieldmap
      POSTGRES_PASSWORD: fieldmap
      POSTGRES_DB: fieldmap
    ports:
      - "5432:5432"
    volumes:
      - db_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U fieldmap -d fieldmap"]
      interval: 5s
      timeout: 5s
      retries: 20

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 5s
      retries: 20

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --reload
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://fieldmap:fieldmap@db:5432/fieldmap
      REDIS_URL: redis://redis:6379/0
    ports:
      - "8000:8000"
    volumes:
      - ./apps/api:/app
      - ./curriculum/build:/curriculum/build:ro
      - obsidian_export:/data/obsidian
      - pdf_storage:/data/pdfs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    command: python -m app.workers.worker
    env_file: .env
    environment:
      DATABASE_URL: postgresql+psycopg://fieldmap:fieldmap@db:5432/fieldmap
      REDIS_URL: redis://redis:6379/0
    volumes:
      - ./apps/api:/app
      - ./curriculum/build:/curriculum/build:ro
      - obsidian_export:/data/obsidian
      - pdf_storage:/data/pdfs
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy

  web:
    build: ./apps/web
    command: npm run dev
    environment:
      NEXT_PUBLIC_API_URL: http://localhost:8000
      API_URL_INTERNAL: http://api:8000
    ports:
      - "3000:3000"
    volumes:
      - ./apps/web:/app
      - /app/node_modules
      - /app/.next
    depends_on:
      - api

volumes:
  db_data:
  obsidian_export:
  pdf_storage:
