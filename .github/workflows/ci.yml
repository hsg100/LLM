name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: backend (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        # pgvector image so the baseline migration's CREATE EXTENSION vector works.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fieldmap
          POSTGRES_PASSWORD: fieldmap
          POSTGRES_DB: fieldmap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fieldmap -d fieldmap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://fieldmap:fieldmap@localhost:5432/fieldmap
      REDIS_URL: redis://localhost:6379/0
      # Writable temp paths so storage/export code doesn't touch the
      # container-only /data mount during tests. (runner.temp isn't available in
      # job-level env, and /tmp is writable on the runner.)
      PDF_STORAGE_DIR: /tmp/fieldmap-pdfs
      OBSIDIAN_EXPORT_REPO_PATH: /tmp/fieldmap-obsidian
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
      - name: Lint (ruff)
        run: ruff check app migrations
      - name: Migrate (alembic upgrade head)
        run: alembic upgrade head
      - name: Test (pytest)
        run: python -m pytest -q

  frontend:
    name: frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Test (vitest)
        run: npm test
      # `next build` type-checks the whole app; it's the green gate until an
      # ESLint config is added (`next lint` is interactive without one).
      - name: Build (next build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
