name: CI

on:
  push:
    branches: ["**"]
  pull_request:

jobs:
  backend:
    name: backend (api)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/api
    services:
      postgres:
        # pgvector image so the baseline migration's CREATE EXTENSION vector works.
        image: pgvector/pgvector:pg16
        env:
          POSTGRES_USER: fieldmap
          POSTGRES_PASSWORD: fieldmap
          POSTGRES_DB: fieldmap
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U fieldmap -d fieldmap"
          --health-interval 5s
          --health-timeout 5s
          --health-retries 10
    env:
      DATABASE_URL: postgresql+psycopg://fieldmap:fieldmap@localhost:5432/fieldmap
      REDIS_URL: redis://localhost:6379/0
      # Writable temp paths so storage/export code doesn't touch the
      # container-only /data mount during tests. (runner.temp isn't available in
      # job-level env, and /tmp is writable on the runner.)
      PDF_STORAGE_DIR: /tmp/fieldmap-pdfs
      OBSIDIAN_EXPORT_REPO_PATH: /tmp/fieldmap-obsidian
    steps:
      - uses: actions/checkout@v4
        with:
          # semver-check compares against the merge-base catalogue
          fetch-depth: 0
      - uses: actions/setup-python@v5
        with:
          python-version: "3.11"
      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip setuptools wheel
          python -m pip install -e ".[dev]"
          python -m pip install -e ../../tools/curriculum_tools
      - name: Lint (ruff)
        run: ruff check app migrations
      - name: Curriculum — validate
        working-directory: .
        run: curriculum-tools validate
      - name: Curriculum — artifact drift gate
        working-directory: .
        run: |
          curriculum-tools build --check
          curriculum-tools emit-schemas --check
      - name: Curriculum — semantic version discipline
        working-directory: .
        run: |
          git fetch origin main --quiet
          curriculum-tools semver-check --base-ref origin/main
      - name: Curriculum — compiler tests
        working-directory: .
        run: python -m pytest tools/curriculum_tools/tests -q
      - name: Migrate (alembic upgrade head, downgrade -1, upgrade head)
        run: |
          alembic upgrade head
          alembic downgrade -1
          alembic upgrade head
      - name: Test (pytest)
        run: python -m pytest -q

  frontend:
    name: frontend (web)
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: apps/web
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: npm
          cache-dependency-path: apps/web/package-lock.json
      - name: Install dependencies
        run: npm install --no-audit --no-fund
      - name: Test (vitest)
        run: npm test
      # `next build` type-checks the whole app; it's the green gate until an
      # ESLint config is added (`next lint` is interactive without one).
      - name: Build (next build)
        run: npm run build
        env:
          NEXT_TELEMETRY_DISABLED: "1"
      # Answer keys must never reach client JavaScript, and /learn routes
      # stay within their bundle budget (design §7).
      - name: Learn bundle checks (answer-key leak + budget)
        run: npm run check:learn-bundle

  images:
    name: images (api/worker smoke)
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Provide the env_file compose expects
        run: printf 'ENV=development\n' > .env
      - name: Build the api/worker image from the root context
        run: docker build -t fieldmap-api -f apps/api/Dockerfile .
      - name: Baked-catalogue smoke (no mounts — proves the image itself)
        run: docker run --rm fieldmap-api python -m app.scripts.smoke_curriculum
      - name: Build via compose (same context wiring the deploys use)
        run: docker compose build api worker
      - name: Boot api with db/redis and probe /health + /ready curriculum fields
        run: |
          docker compose up -d db redis api
          for i in $(seq 1 30); do
            curl -fsS http://localhost:8000/health >/dev/null 2>&1 && break
            sleep 2
          done
          curl -fsS http://localhost:8000/health
          READY=$(curl -sS http://localhost:8000/ready)
          echo "$READY"
          echo "$READY" | grep -q '"curriculum":"ok"' || (echo "curriculum not ok in /ready" && exit 1)
      - name: Worker image catalogue smoke
        run: docker compose run --rm --no-deps worker python -m app.scripts.smoke_curriculum
      - name: Teardown
        if: always()
        run: docker compose down -v
