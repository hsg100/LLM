services:
  db:
    image: pgvector/pgvector:pg16
    restart: unless-stopped
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-fieldmap}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:?set POSTGRES_PASSWORD in .env.production}
      POSTGRES_DB: ${POSTGRES_DB:-fieldmap}
    volumes:
      - postgres_data:/var/lib/postgresql/data
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-fieldmap} -d $${POSTGRES_DB:-fieldmap}"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - backend

  redis:
    image: redis:7-alpine
    restart: unless-stopped
    command: redis-server --appendonly yes
    volumes:
      - redis_data:/data
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 5s
      retries: 20
    networks:
      - backend

  api:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: uvicorn app.main:app --host 0.0.0.0 --port 8000 --workers ${API_WORKERS:-2}
    env_file:
      - ${ENV_FILE:-.env.production}
    expose:
      - "8000"
    volumes:
      - pdf_storage:/data/pdfs
      - obsidian_export:/data/obsidian
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    healthcheck:
      test: ["CMD-SHELL", "python -c \"import urllib.request; urllib.request.urlopen('http://127.0.0.1:8000/ready', timeout=5)\""]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 30s
    networks:
      - backend
      - public

  worker:
    build:
      context: .
      dockerfile: apps/api/Dockerfile
    restart: unless-stopped
    command: python -m app.workers.worker
    env_file:
      - ${ENV_FILE:-.env.production}
    volumes:
      - pdf_storage:/data/pdfs
      - obsidian_export:/data/obsidian
    depends_on:
      db:
        condition: service_healthy
      redis:
        condition: service_healthy
    networks:
      # backend: reach db + redis. public: outbound internet for the pipeline
      # (arXiv / Semantic Scholar search, LLM API calls, PDF downloads). Without
      # public the worker is stranded on the internal-only backend network and
      # every search returns zero candidates. The worker publishes no ports, so
      # this is outbound egress only.
      - backend
      - public

  caddy:
    image: caddy:2-alpine
    restart: unless-stopped
    environment:
      API_DOMAIN: ${API_DOMAIN:?set API_DOMAIN in .env.production}
      ACME_EMAIL: ${ACME_EMAIL:?set ACME_EMAIL in .env.production}
    ports:
      - "80:80"
      - "443:443"
    volumes:
      - ./deploy/caddy/Caddyfile:/etc/caddy/Caddyfile:ro
      - caddy_data:/data
      - caddy_config:/config
    depends_on:
      api:
        condition: service_started
    networks:
      - public

networks:
  backend:
    internal: true
  public:

volumes:
  postgres_data:
  redis_data:
  pdf_storage:
  obsidian_export:
  caddy_data:
  caddy_config:
